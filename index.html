<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abdulmoiz Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.66/build/spline-viewer.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
    body { background:#000; color:#fff; overflow:hidden; /* Prevent scrolling on main hero page */ }

    header {
      position:fixed;
      top:0;
      width:100%;
      backdrop-filter: blur(10px);
      background:rgba(0,0,0,0.4);
      border-bottom:1px solid rgba(255,255,255,0.05);
      z-index:50;
    }

    .nav {
      max-width:1200px;
      margin:auto;
      padding:18px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* Make logo text bold and crisp */
    .nav h2 { font-weight: 700; letter-spacing: 1px; }

    nav a { 
      color:#aaa; 
      margin-left:30px; 
      text-decoration:none; 
      font-size: 15px;
      font-weight: 400;
      transition: color 0.3s ease;
    }
    nav a:hover { color:#fff; }

    .hero {
      height:100vh;
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    spline-viewer {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .hero-content {
      position:relative;
      z-index:2;
      opacity:0;
      transform:translateY(40px);
      transition:all 1s cubic-bezier(0.16, 1, 0.3, 1); /* Smoother fade-in */
      pointer-events: none; 
      padding: 0 20px;
    }

    .hero-content .btns { pointer-events: auto; }

    .hero-content.show {
      opacity:1;
      transform:translateY(0);
    }

    h1 { font-size:64px; font-weight: 700; line-height: 1.1; margin-bottom: 10px; }
    p { color:#bbb; font-size: 18px; font-weight: 300; max-width: 600px; margin: 0 auto; line-height: 1.6; }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      h1 { font-size: 42px; }
      p { font-size: 16px; }
      .nav { flex-direction: column; gap: 15px; }
      nav a { margin: 0 10px; }
      body { overflow-y: auto; } /* Allow scroll on mobile if needed */
    }

    .btns { margin-top:40px; display: flex; gap: 15px; justify-content: center; }
    
    .btn {
      display: inline-block;
      padding:14px 28px;
      border-radius:30px; /* Pill-shaped buttons for modern look */
      text-decoration: none;
      font-weight:600;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
    .btn:active { transform: translateY(0); }

    .primary { background:#fff; color:#000; }
    .outline { background:transparent; border:1px solid #fff; color:#fff; }

    .loader {
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:100;
      transition:opacity .6s ease, visibility .6s ease;
    }

    .spinner {
      width:40px;
      height:40px;
      border:3px solid rgba(255,255,255,0.2);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin { to { transform:rotate(360deg);} }
    .hidden { opacity:0; visibility: hidden; pointer-events:none; }
    
    /* Footer pinned to bottom of screen */
    footer { 
      position: absolute; 
      bottom: 0; 
      width: 100%; 
      padding:20px; 
      color:#555; 
      text-align: center; 
      font-size: 14px; 
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="loader" class="loader">
  <div class="spinner"></div>
</div>

<header>
  <div class="nav">
    <h2>Abdulmoiz</h2>
    <nav>
      <a href="about.html" target="_blank">About</a>
      <a href="projects.html" target="_blank">Projects</a>
      <a href="contact.html" target="_blank">Contact</a>
    </nav>
  </div>
</header>

<section class="hero">
  <spline-viewer id="spline"
    url="https://prod.spline.design/O2dA8-ZGZtnRjczq/scene.splinecode">
  </spline-viewer>

  <div id="heroContent" class="hero-content">
    <h1>Hi, I'm Abdulmoiz</h1>
    <p>Computer Science Student & Web Developer focused on building clean, modern, and interactive digital experiences.</p>
    <div class="btns">
      <a href="projects.html" target="_blank" class="btn primary">View My Work</a>
      <a href="contact.html" target="_blank" class="btn outline">Get In Touch</a>
    </div>
  </div>
</section>

<footer>
  © <span id="year"></span> Abdulmoiz. All rights reserved.
</footer>

<script>
  const loader = document.getElementById("loader");
  const hero = document.getElementById("heroContent");
  const spline = document.getElementById("spline");

  customElements.whenDefined('spline-viewer').then(() => {
    console.log("Spline viewer ready.");
  });

  function revealSite() {
    if (!loader.classList.contains("hidden")) {
      loader.classList.add("hidden");
      hero.classList.add("show");
    }
  }

  spline.addEventListener("load", () => {
    setTimeout(revealSite, 600); 
  });

  setTimeout(() => {
    revealSite();
  }, 4000);

  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
